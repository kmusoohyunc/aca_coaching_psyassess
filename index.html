<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>심리검사 시스템 (447문항)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #11998e;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2em;
        }
        
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.6em;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .question {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #11998e;
        }
        
        .question-number {
            color: #11998e;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 1.15em;
            color: #222;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .option-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s;
        }
        
        .option-circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #e0e0e0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            transition: all 0.3s;
        }
        
        .option-wrapper:hover .option-circle {
            border-color: #11998e;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.3);
        }
        
        .option-wrapper.selected .option-circle {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-color: #11998e;
            transform: scale(1.05);
        }
        
        .option-text {
            margin-top: 10px;
            font-size: 0.85em;
            text-align: center;
            color: #666;
            max-width: 90px;
            line-height: 1.3;
        }
        
        .option-wrapper.selected .option-text {
            color: #11998e;
            font-weight: 600;
        }
        
        .button {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 16px 35px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .progress-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 180px;
        }
        
        .progress-label {
            font-size: 0.85em;
            color: #666;
            font-weight: 500;
        }
        
        .progress-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #11998e;
        }
        
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .test-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .test-header h3 {
            margin: 0 0 10px 0;
            font-size: 1.6em;
        }
        
        .test-header .instruction {
            margin: 10px 0;
            opacity: 0.95;
            font-size: 1.05em;
            line-height: 1.5;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            gap: 15px;
        }
        
        .button.secondary {
            background: #95a5a6;
        }
        
        .button.secondary:hover {
            background: #7f8c8d;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .result-box {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0;
        }
        
        .result-box h3 {
            font-size: 2em;
            margin-bottom: 15px;
        }
        
        .user-info {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 12px 0;
            color: #555;
            font-size: 1.05em;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .progress-container {
                position: static;
                margin-bottom: 20px;
            }
            
            .options {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .option-wrapper {
                flex: 0 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>심리검사 시스템</h1>
        
        <!-- 진행률 표시 -->
        <div class="progress-container" id="progressContainer" style="display:none;">
            <div>
                <span class="progress-label">검사</span>
                <span class="progress-value">
                    <span id="currentTest">1</span>/<span>22</span>
                </span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="testProgressBar" style="width: 0%"></div>
            </div>
            <div>
                <span class="progress-label">현재 검사 진행</span>
                <span class="progress-value">
                    <span id="currentItem">0</span>/<span id="totalItems">0</span>
                </span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="itemProgressBar" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- 사용자 정보 섹션 -->
        <div id="userInfoSection" class="section active">
            <h2>사용자 정보</h2>
            <div class="form-group">
                <label for="userId">ID *</label>
                <input type="text" id="userId" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="gender">성별 *</label>
                <select id="gender" required>
                    <option value="">선택하세요</option>
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                    <option value="other">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label for="major">전공 *</label>
                <input type="text" id="major" placeholder="전공을 입력하세요" required>
            </div>
            <div class="button-group">
                <button class="button" onclick="startTest()">검사 시작</button>
            </div>
        </div>
        
        <!-- 검사 섹션들 -->
        <div id="testSections"></div>
        
        <!-- 결과 섹션 -->
        <div id="resultSection" class="section">
            <h2>검사 완료!</h2>
            <div class="result-box">
                <h3>🎉 모든 검사를 완료했습니다</h3>
                <p style="font-size: 1.2em; margin-top: 10px;">총 480개 문항 응답 완료</p>
            </div>
            <div class="user-info" id="resultUserInfo"></div>
            <div class="button-group">
                <button class="button" onclick="submitToGoogleSheets()" id="submitBtn">📤 결과 제출 (Google Sheets)</button>
                <button class="button secondary" onclick="downloadResults()">💾 결과 다운로드 (TXT)</button>
            </div>
            <div id="submitMessage" style="margin-top: 20px; padding: 15px; border-radius: 8px; display: none;"></div>
        </div>
    </div>

    { id: 81, text: "나는 학업이나 일에 대한 성취기준이 높다." },
    { id: 82, text: "정리정돈을 잘 한다." },
    { id: 83, text: "목표를 달성할 수 없을 때 종종 좌절감을 느낀다." },
    { id: 84, text: "단정한 것을 중요시한다." },
    { id: 85, text: "스스로에게 많은 것을 기대해야만 성공할 수 있다고 생각한다." },
    { id: 86, text: "충분히 최선을 다하고 있는 것 같지 않다." },
    { id: 87, text: "사물은 늘 제자리에 놓여져 있어야 한다." },
    { id: 88, text: "나에 대해 높은 기대를 가지고 있다." },
    { id: 89, text: "나의 높은 기준에 도달한 적이 거의 없다." },
    { id: 90, text: "조직적이고 규율화된 것을 좋아한다." },
    { id: 91, text: "최선을 다하는 것만으로는 결코 충분한 것 같지 않다." },
    { id: 92, text: "내 자신에 대해 매우 높은 기준을 설정한다." },
    { id: 93, text: "성취한 것에 대해 결코 만족하지 않는다." },
    { id: 94, text: "내가 최선을 다하기를 기대한다." },
    { id: 95, text: "나의 기대에 미치지 못하는 것에 대해 자주 걱정된다." },
    { id: 96, text: "내가 한 일은 내 기준에 거의 못 미친다." },
    { id: 97, text: "최선을 다했다는 것을 알 때조차도 만족하지 못한다." },
    { id: 98, text: "모든 일에 최선을 다하려고 한다." },
    { id: 99, text: "내가 세운 높은 기준을 거의 충족시킬 수 없다." },
    { id: 100, text: "내가 한 일의 결과에 대해 거의 만족하지 않는다." },
    { id: 101, text: "내가 한 일이 훌륭하다고 느낀 적이 거의 없다." },
    { id: 102, text: "탁월함을 추구하려는 강한 욕구를 가지고 있다." },
    { id: 103, text: "일이 끝난 후 좀 더 잘했어야 한다는 생각에 낙담할 때가 많다." },
    { id: 104, text: "시험에는 자신이 있어 별로 긴장하지 않는다." },
    { id: 105, text: "시험기간 동안 줄곧 마음이 편하지 못하다." },
    { id: 106, text: "시험점수 생각에 시험공부가 잘 안 될 때가 있다." },
    { id: 107, text: "시험 걱정에 매달려 마음의 여유가 없다." },
    { id: 108, text: "시험을 치는 동안 내 성적으로 원하는 학교에 진학할 수 있을지 걱정한다." },
    { id: 109, text: "문제를 푸는 순간에도 걱정이 되어 애를 태운다." },
    { id: 110, text: "혹시 틀리지 않을까 하는 생각 때문에 주의집중이 잘 안 된다." },
    { id: 111, text: "시험을 칠 때에 안절부절 못하고 몹시 서둔다." },
    { id: 112, text: "시험공부를 아무리 많이 해도 시험시간만 되면 초조해진다." },
    { id: 113, text: "시험점수를 알기 전에는 도무지 마음이 놓이지 않는다." },
    { id: 114, text: "답을 쓰는 순간 손발이 떨린다." },
    { id: 115, text: "이제 시험이나 성적 걱정에서 벗어났으면 좋겠다." },
    { id: 116, text: "식욕을 잃고 속이 불편할 정도로 신경이 날카로워진다." },
    { id: 117, text: "시험은 나에게 좌절감과 패배감을 갖게 한다." },
    { id: 118, text: "시험을 치는 동안 몹시 당황한다." },
    { id: 119, text: "시험일자가 다가오면 나도 모르게 몸과 마음이 굳어진다." },
    { id: 120, text: "시험 치는 순간에도 성적이 떨어질까봐 마음 졸인다." },
    { id: 121, text: "시험 치는 동안 가슴이 두근거리고 입이 마른다." },
    { id: 122, text: "시험을 치고 난 다음에도 시험 걱정을 한다." },
    { id: 123, text: "몹시 긴장해서 아는 것도 생각나지 않을 때가 있다." },
    { id: 124, text: "나는 평온하다." },

    { id: 129, text: "나는 언짢다." },

    { id: 136, text: "나는 안절부절하다." },
    { id: 137, text: "나는 무엇을 어찌해야 좋을지 모르겠다." },

    { id: 139, text: "나는 만족스럽다." },
    { id: 140, text: "나는 걱정이 많다." },
    { id: 141, text: "나는 혼란스럽다." },

    { id: 143, text: "나는 유쾌하다." },
    { id: 144, text: "나는 유쾌하다." },
    { id: 145, text: "나는 초조하고 안절부절 못한다." },
    { id: 146, text: "내 자신에 대해 만족한다." },
    { id: 147, text: "나는 다른 사람들만큼 행복하지 못하다." },
    { id: 148, text: "나는 마치 낙오자 같다." },
    { id: 149, text: "나는 마음이 편안하다." },
    { id: 150, text: "나는 차분하고 침착하다." },
    { id: 151, text: "나는 어려운 일들이 많이 쌓여 극복할 수 없을 것 같다." },
    { id: 152, text: "나는 대수롭지 않은 일을 가지고 많이 걱정한다." },
    { id: 153, text: "나는 행복하다." },
    { id: 154, text: "나는 여러 생각들로 혼란스럽다." },
    { id: 155, text: "나는 자신감이 부족하다." },
    { id: 156, text: "나는 마음이 든든하다." },
    { id: 157, text: "나는 결정을 쉽게 잘 한다." },
    { id: 158, text: "나는 내 자신이 부적절한 것 같다." },
    { id: 159, text: "나는 만족스럽다." },
    { id: 160, text: "나는 사소한 생각으로 마음이 쓰이고 괴로워한다." },
    { id: 161, text: "나는 심하게 낙담하여 헤어나지 못한다." },
    { id: 162, text: "나는 마음이 안정된 사람이다." },
    { id: 163, text: "나는 최근의 근심이나 관심거리를 생각하면 긴장되고 혼란스럽다." },
    { id: 164, text: "평소에는 아무렇지도 않던 일들이 귀찮게 느껴졌다." },
    { id: 165, text: "먹고 싶지 않았다; 입맛이 없었다." },
    { id: 166, text: "가족이나 친구가 도와주더라도 울적한 기분이 떨쳐버릴 수 없었다." },
    { id: 167, text: "다른 사람만큼 능력이 있다고 느꼈다." },
    { id: 168, text: "무슨 일을 하든 정신을 집중하기가 힘들었다." },
    { id: 169, text: "우울했다." },
    { id: 170, text: "하는 일마다 힘들게 느껴졌다." },
    { id: 171, text: "미래에 대하여 희망적으로 느꼈다." },
    { id: 172, text: "내 인생은 실패작이라는 생각이 들었다." },
    { id: 173, text: "두려움을 느꼈다." },
    { id: 174, text: "잠을 설쳤다; 잠을 잘 이루지 못했다." },
    { id: 175, text: "행복했다." },
    { id: 176, text: "평소보다 말을 적게 했다; 말수가 줄었다." },
    { id: 177, text: "세상에 홀로 있는 듯한 외로움을 느꼈다." },
    { id: 178, text: "사람들이 나에게 차갑게 대하는 것 같았다." },
    { id: 179, text: "생활이 즐거웠다." },
    { id: 180, text: "갑자기 울음이 나왔다." },
    { id: 181, text: "슬픔을 느꼈다." },
    { id: 182, text: "사람들이 나를 싫어하는 것 같았다." },
    { id: 183, text: "도무지 무엇을 시작할 기운이 나지 않았다." },
    // BAT(33)
    { id: 184, text: "나는 정신적으로 지친다" },
    { id: 185, text: "내가 하는 모든 일은 상당한 노력을 요한다" },
    { id: 186, text: "하루가 끝난 후 기운을 회복하는 것은 어렵다" },
    { id: 187, text: "나는 체력적으로 지친다" },
    { id: 188, text: "아침에 일어나면,  새로운 하루를 시작할 힘이 부족하다" },
    { id: 189, text: "나는 적극적이고 싶지만, 왠지 그렇지 못한다" },
    { id: 190, text: "열중할 경우, 평소보다 빨리 지친다" },
    { id: 191, text: "하루가 끝난 후, 나는 정신적으로 지치고 진이 빠진다" },
    { id: 192, text: "나는 내 일에 대한 열정을 찾기 힘들다" },
    { id: 193, text: "나는 내가 무엇을 하는지에 대해 생각하지 않고 기계적으로 일한다" },
    { id: 194, text: "나는 내가 하는 일이 정말 싫다." },
    { id: 195, text: "나는 내 일에 무관심하다" },
    { id: 196, text: "나는 내 일이 다른 사람에게 어떠한 의미가 있을 지에 대해서 냉소적이다" },
    { id: 197, text: "나는  한 가지 일에 집중하는 것이 힘들다" },
    { id: 198, text: "나는  명료하게 생각하는 것이 힘들다" },
    { id: 199, text: "나는  잘 까먹고 주의가 산만하다" },
    { id: 200, text: "난 집중하기가 힘들다" },
    { id: 201, text: "나는  다른 일에 신경 쓰다가 실수를 하곤 한다" },
    { id: 202, text: "나는 내 감정을 다스릴 수가 없다" },
    { id: 203, text: "내가 감정적으로 어떤 반응을 하는지 인식하지 못한다" },
    { id: 204, text: "일이 내가 원하는 대로 흘러가지 않을 경우에 짜증이 난다" },
    { id: 205, text: "나는 이유 없이 화가 나거나 슬퍼지곤 한다" },
    { id: 206, text: "나는 뜻하지 않게 과하게 반응하곤 한다" },
    { id: 207, text: "나는 잠 드는 것이나, 깨지 않고 자는 데 어려움이 있다" },
    { id: 208, text: "나는 걱정을 많이 하는 편이다" },
    { id: 209, text: "나는 긴장감을 느끼고 스트레스를 받는다" },
    { id: 210, text: "나는 불안하고(또는) 공황발작에 시달린다" },
    { id: 211, text: "큰 소리가 나고 사람이 많은 것에 방해를 받는다" },
    { id: 212, text: "나는 심장 두근거림이나 가슴통증이 있다" },
    { id: 213, text: "나는 위장쪽이 탈이 나곤 한다" },
    { id: 214, text: "나는 두통이 있다" },
    { id: 215, text: "나는 목, 어깨, 혹은 허리에 근육통이 있다" },
    { id: 216, text: "나는 종종 아프다" },

    { id: 217, text: "행복감을 느꼈다" },
    { id: 218, text: "삶에 흥미를 느꼈다." },
    { id: 219, text: "만족감을 느꼈다." },
    { id: 220, text: "나는 사회에 공헌할 만한 능력을 지니고 있다고 느꼈다." },
    { id: 221, text: "공동체(사회 집단이나 이웃 같은)에 소속되어 있다고 느꼈다." },
    { id: 222, text: "우리 사회가 나와 같은 사람들에게더 살기 좋은 곳이 되어가고 있다고 느꼈다." },
    { id: 223, text: "사람들은 기본적으로 선하다고 느꼈다." },
    { id: 224, text: "우리 사회가 돌아가는 방식이 이해할 만하다고 느꼈다." },
    { id: 225, text: "나는 내 성격의 대부분을 좋아하고 있다고 느꼈다." },
    { id: 226, text: "매일의 생활에서 내가 해야 할 책임들을 잘 해내고 있다고 느꼈다." },
    { id: 227, text: "다른 사람들과 따뜻하고 신뢰로운 관계를 맺고 있다고 느꼈다." },
    { id: 228, text: "나를 성장시키고 더 나은 사람이 되도록 자극을 주는 경험들을 했다고 느꼈다." },
    { id: 229, text: "나만의 아이디어와 의견을 생각하거나 표현하는데 자신이 있다고 느꼈다." },
    { id: 230, text: "내 삶이 방향감이나 의미를 갖고 있다고 느꼈다." },
    { id: 231, text: "나의 부모님은 그들이 나를 사랑한다는 것을 알게한다." },
    { id: 232, text: "나의 부모님은 나와 함께 있는 것을 좋아하신다." },
    { id: 233, text: "나의 부모님은 나를 항상 반갑게 맞아주신다." },
    { id: 234, text: "나의 부모님은 나를 특별하다고 생각하신다." },
    { id: 235, text: "나의 부모님은 묻지 않아도 내 기분이 어떤지 알 수 있다." },
    { id: 236, text: "나의 부모님은 내 모습 그대로도 행복해하신다." },

    { id: 240, text: "나의 부모님은 내가 항상 방해가 된다고 생각한다." },
    { id: 241, text: "나는 부모님은 나를 원하지 않는 것 같다." },
    { id: 242, text: "내가 하는 어떤 것도 부모님은 만족하지 않는다." },
    { id: 243, text: "내가 화가나도 나의 부모님은 상관하지 않는다" },
    { id: 244, text: "나의 부모님은 나에 대한 좋은 것은 말하지 않고, 항상 지적만 한다." },
    { id: 245, text: "나의 부모님은 나를 정말 사랑하지 않는다." },
    { id: 246, text: "나의 부모님은 아주 사소한 것들로 나를 괴롭힌다." },
    { id: 247, text: "내가 뭔가를 하고 싶을 때, 나의 부모님은 방법을 알려준다" },
    { id: 248, text: "나의 부모님은 내가 현상이 어떻게 돌아가는지 이해하기 원할 때, 나에게 설명해주신다." },
    { id: 249, text: "만약 내게 문제가 생긴다면 나의 부모님은 내가 어떻게 해결해나가면 되는지 찾을 수 있도록 도와준다." },
    { id: 250, text: "나의 부모님은 우리 가족의 규율에 대한 이유에 대해 설명해주신다." },
    { id: 251, text: "나의 부모님은 내가 가족의 규율을 잘 따르기를 기대하신다." },
    { id: 252, text: "나의 부모님은 나의 일을 내 스스로 할 수 있는 방법을 알려준다." },
    { id: 253, text: "나의 부모님은 약속을 잘 지키신다." },
    { id: 254, text: "나의 부모님이 하려고 하는 것을 얘기해 주면, 나는 부모님이 그것을 할 것을 안다." },
    { id: 255, text: "나는 부모님이 약속할 때, 부모님이 그 약속을 지킬지 잘 모르겠다." },
    { id: 256, text: "나의 부모님이 무언가를 하겠다고 말할 때,  가끔 정말 그것을 하지 않는다." },
    { id: 257, text: "나의 부모님은 나에 대한 규칙을 계속 바꾼다." },
    { id: 258, text: "나의 부모님은 나에게 사전 경고도 없이 화를 낸다." },
    { id: 259, text: "내가 무언가를 잘못했을 때, 나는 나의 부모님이 어떻게 반응할지 모른다." },
    { id: 260, text: "나의 부모님은 아무 이유없이 나를 벌준다." },
    { id: 261, text: "나는 부모님이 어디 있는지 모르는 경우가 많다." },
    { id: 262, text: "나는 부모님이 다음에 무엇을 할지 모른다." },
    { id: 263, text: "나의 부모님은 나를 믿는다." },
    { id: 264, text: "나의 부모님은 나를 위해 나를 수용한다." },
    { id: 265, text: "나의 부모님은 내가 중요하다고 생각하는 것을 하게 해준다." },
    { id: 266, text: "나의 부모님은 나의 관점을 이해하려고 노력한다." },
    { id: 267, text: "나의 부모님은 나에게 무언가를 하라고 요청할 때, 그 이유에 대해 설명한다." },
    { id: 268, text: "나의 부모님은 나 자신에게 충실(진실, 솔직)하도록 북돋아준다." },
    { id: 269, text: "나의 부모님은 내가 생각하는 것 그대로 말하기를 기대한다." },
    { id: 270, text: "나의 부모님은 어떻게 일을 해야하는 지에 대한 나의 생각을 알고 싶어한다." },
    { id: 271, text: "나의 부모님은 항상 나에게 해야 할 것을 말한다" },
    { id: 272, text: "나의 부모님은 나를 쥐고 흔든다(지배한다, 지시내린다)." },
    { id: 273, text: "나의 부모님은 그들의 방식이 유일한 정답이라 생각한다." },
    { id: 241, text: "나의 부모님은 모든 것에 \"안돼\"라고 이야기한다." },
    { id: 242, text: "나의 부모님이 설명하는 유일한 이유는  \"내가 그렇게 이야기 했잖아\"뿐이다." },
    { id: 276, text: "나의 부모님은 부모님말씀에 내가 동의하지 않는 것을 허락하지 않는다." },
    { id: 277, text: "나의 부모님께 내가 하는 모든 것을 통제하려고 한다." },
    { id: 278, text: "나의 부모님은 모든 것을 가장 잘  안다고 생각한다." },
    { id: 279, text: "스트레스는 부정적인 효과를 가져오기에 피해야 하는 것이다." },
    { id: 280, text: "스트레스 경험은 나의 배움과 성장을 촉진한다." },
    { id: 281, text: "스트레스 경험은 내 건강과 활력을 떨어뜨린다." },
    { id: 282, text: "스트레스 경험은 내 성취와 생산성을 높인다." },
    { id: 283, text: "스트레스 경험은 나의 배움과 성장을 억제한다." },
    { id: 284, text: "스트레스 경험은 내 건강과 활력을 향상시킨다." },
    { id: 285, text: "스트레스 경험은 내 성취와 생산성을 낮춘다." },
    { id: 286, text: "스트레스는 긍정적 효과를 가져오기에 활용되어야 하는 것이다." },
    { id: 287, text: "마지막까지 과제를 미루는 경우, 만족스런 결과를 얻지 못한다" },
    { id: 288, text: "마감일에 쫓기는 경우, 성과는 나쁘게 나타나는 경향이 있다." },
    { id: 289, text: "일을 급하게 처리해야 하는 경우, 그 일을 잘 해내지 못한다." },
    { id: 290, text: "마감 전에 여유를 가지고 미리 과제를 끝내면, 더 좋은 결과를 얻는다" },
    { id: 291, text: "시간압박을 받으며 일하게 되면 당황하고 일이 하기 싫어진다" },
    { id: 292, text: "시간적인 압박이 강한 경우, 긴장하고 집중하지 못한다" },
    { id: 293, text: "마감시한에 임박해서 일하는 경우 엄청난 스트레스를 받는다." },
    { id: 294, text: "마감일을 맞추기 위해 급하게 일을 처리하는 경우, 나는 좌절감을 느 낀다" },
    { id: 295, text: "시간을 잘 활용하기 위해서 특정 과제는 일부로 뒤로 미뤄둔다" },
    { id: 296, text: "시간을 효율적으로 이용하기 위해 일부러 몇몇 과제를 미룬다" },
    { id: 297, text: "동기를 극대화시키기 위해 의도적으로 일들을 뒤로 미룬다." },
    { id: 298, text: "나는 대부분의 일을 마감 직전에 끝마치는데, 이는 내가 그렇게 하기 로 결정했기 때문이다" },
    { id: 299, text: "일단 일을 시작해도 그것을 잘 끝내지 못하는 경우가 많다." },
    { id: 300, text: "나는 자주 내가 세운 목표를 달성하지 못한다." },
    { id: 301, text: "기한을 넘겨서야 과제를 마치는 일이 자주 있다" },
    { id: 302, text: "가끔 마지막 순간에 과제에 착수하는데, 그리고 나서는 제 시간에 그 과제를 마치기가 힘들다는 것을 깨닫는다" },
    { id: 303, text: "중요한 일인데도 불필요하게 일의 완료를 미룬다." },
    { id: 304, text: "좋아하지 않은 일의 시작을 미룬다." },
    { id: 305, text: "마감시한(기한)이 정해져 있을 때는 최종 순간까지 미루어둔다." },
    { id: 306, text: "곤란한 결정을 내리는 것을 미룬다." },
    { id: 307, text: "공부습관(작업 습관)을 향상시키는 것을 미룬다." },
    { id: 308, text: "어떤 일을 하지 않는 것에 대한 핑계거리를 찾는다." },
    { id: 309, text: "지루한 일(과제)에도 필요한 시간을 할당(배분)한다." },
    { id: 310, text: "나는 고치기 힘든 시간 허비자(낭비자)이다." },
    { id: 311, text: "나는 시간 허비자(낭비자)이지만, 이런 문제(시간을 낭비하는 문제)에 대해 아무것도 할 수 없을 것 같다." },
    { id: 312, text: "문제를 다루기 너무 곤란할 때 미룬다." },
    { id: 313, text: "어떤 일을 하겠다고 스스로 약속하고는 미룬다." },
    { id: 314, text: "실행계획을 세울 때마다 그 계획에 따른다" },
    { id: 315, text: "시작하지 않는 내 자신이 싫지만, 그런 나를 변화시키지는 않는다." },
    { id: 316, text: "중요한 일은 항상 시간 여유를 가지고 완료한다." },
    { id: 317, text: "그 일을 시작하는 것이 얼마나 중요한지를 알고 있을 때에도 다른 일에 전념한다." },
    { id: 318, text: "일을 미루는 것은 내 생활방식이 아니다." },
    { id: 286, text: "\"이제 보고서를 시작해야 하는데\"라는 생각을 하면서도 그렇게 하지 못하는 경우가 많다." },
    { id: 320, text: "과제를 늦게 시작하는 습관을 고치려고 해도 잘 안된다." },
    { id: 321, text: "일을 일찍 시작해서 꾸준히 진행하지만, 그럼에도 불구하고 좀처럼 일을 제 시간에 끝내지 못한다." },
    { id: 289, text: "보고서 과제가 주어지면 \"나중에 시작해야지\"라고 생각한다." },
    { id: 323, text: "나는 중요한 일을 시작하는 것을 미룬다." },
    { id: 324, text: "보고서를 미리 준비하기 시작하더라도 자료를 모으는 데 열중하다가 마감시간이 얼마 안 남았을 때 서둘러 완성시키기 바쁘다." },
    { id: 325, text: "나는 습관적으로 과제를 늦게 시작한다. 그러다가 마감기한이 가까워졌을 때 서둘러 과제를 끝내느라 고생한다." },
    { id: 326, text: "보고서를 시작하기까지 많은 시간이 걸린다." },
    { id: 294, text: "과제를 아무리 일찍 시작해도 시간이 부족해서 \"교수님께서 제출일을 늦춰 주셨으면\"하고 바란다." },
    { id: 328, text: "나는 중요치 않은 일을 하느라 시간을 허비해서 결국 과제를 늦게 시작한다." },
    { id: 329, text: "매번 과제 시작을 미루지 않겠다고 다짐하지만, 늘 과제 시작을 미루게 된다." },
    { id: 330, text: "일의 시작을 미루는 것은 나의 큰 고민거리이다." },
    { id: 331, text: "빨리 끝낼 수 있는 과제라도 늦게 시작해서 제출이 늦어진다." },
    { id: 332, text: "보고서 제출일이 가까워져야 비로소 자료를 찾기 시작한다." },
    { id: 333, text: "보고서를 일찍 쓰기 시작했는데도 마감 전 날에 밤을 새운다." },
    { id: 334, text: "일을 일찍 시작하더라도, 도중에 더 이상 어떻게 진행시켜야할지 결정하지 못해 마무리가 늦어진다." },
    { id: 335, text: "과제를 아무리 일찍 시작해도 빨리 마무리 지을 때가 없다." },
    { id: 336, text: "아무리 금방 끝낼 수 있는 간단한 과제라도 일찍 시작한다. 하지만 이상하게 완성이 늦어지곤 한다." },
    { id: 337, text: "나는 공부를 하지 않으면 부모님이 화를 내시므로 공부를 한다." },
    { id: 338, text: "나는 선생님께 인정받기 위해서 공부를 한다." },
    { id: 339, text: "나는 수업내용을 이해하는데 도움이 되므로 공부를 한다." },
    { id: 340, text: "나는 공부하는 것이 즐거워서 공부를 한다." },
    { id: 341, text: "나는 내가 학교에서 뭘 하고 있는지 모르겠다." },
    { id: 342, text: "나는 공부를 하면 부모님이 상(용돈, 선물, 칭찬 등)을 주시므로 공부를 한다." },
    { id: 343, text: "나는 선생님이 나를 무시하는 것을 원하지 않으므로 공부를 한다." },
    { id: 344, text: "나는 공부하면서 모르는 것을 알아가기 위해서 공부한다." },
    { id: 345, text: "나는 어려운 도전으로부터 기쁨을 얻기 때문에 공부 한다." },
    { id: 346, text: "나는 공부를 왜 해야 하는지 모르겠다." },
    { id: 347, text: "나는 공부를 하면 선생님이 칭찬을 하시므로 공부를 한다." },
    { id: 348, text: "나는 성적이 나쁘면 창피하기 때문에 공부한다." },
    { id: 349, text: "나는 지식을 쌓아가는 것은 가치 있는 일이라고 믿기 때문에 공부한다." },
    { id: 350, text: "나는 지식을 키우는 것이 재미있어서 공부한다." },
    { id: 351, text: "나는 솔직히 학교에서 시간을 낭비하는 것 같은 느낌이다." },
    { id: 352, text: "나는 공부하지 않으면 선생님이 벌(야단, 체벌)을 주시므로 공부한다." },
    { id: 353, text: "나는 부모님이 실망하시는 것을 원하지 않기 때문에 공부한다." },
    { id: 354, text: "나는 공부를 하면 실생활에 유용하게 쓰일 수 있으므로 공부한다." },
    { id: 355, text: "나는 공부를 하는 것이 재미있기 때문에 공부한다." },
    { id: 356, text: "나는 왜 학교에 가는지 모르겠고, 솔직히 전혀 신경을 쓰지 않는다." },
    { id: 357, text: "나는 부모님이 하라고 시키시므로 공부한다." },
    { id: 358, text: "나는 친구들이 나를 똑똑한 학생으로 봐주기를 원하므로 공부한다." },
    { id: 359, text: "나는 나중에 공부할 때 좀 더 어려운 내용을 이해하는데 도움이 되므로 공부한다." },
    { id: 360, text: "나는 생각하기를 좋아하기 때문에 공부한다." },
    { id: 361, text: "시험이 닥쳐와도 공부를 안 한다." },
    { id: 362, text: "나는 선생님이 하라고 시키시므로 공부한다." },
    { id: 363, text: "나는 경쟁상대를 이기기 위해서 공부한다." },
    { id: 364, text: "나는 수업시간에 배운 내용을 확인하려고 공부한다." },
    { id: 365, text: "나는 모르는 것에 대한 해답을 알고 싶어서 공부한다." },
    { id: 366, text: "나는 성적에 무관심하다." },
    { id: 367, text: "나의 목표는 다른 학생들보다 좋은 성적을 받는 것이다" },
    { id: 368, text: "나의 목표는 다른 학생들과 비교하여 나쁜 성적을 받지 않는 것이다" },
    { id: 369, text: "나는 새로운 것을 배울 수 있는 도전적인 숙제를 좋아한다" },
    { id: 370, text: "나는 선생님이 주신 숙제의 내용을 이해하지 못 할까봐 여러 번 확인한다" },
    { id: 371, text: "나는 다른 학생 보다 좋은 점수를 받는 상상을 하면 의욕이 생긴다" },
    { id: 372, text: "내가 수업을 열심히 듣는 이유는 다른 학생들에 뒤떨어지지 않기 위해서이다" },
    { id: 373, text: "수업을 통해 나의 능력을 향상 시키는 것은 중요하다" },
    { id: 374, text: "나는 주어진 시간 내에 완벽하게 숙제를 끝마치지 못 할까봐 두렵다" },
    { id: 375, text: "다른 학생들과 비교했을 때 내가 공부를 더 잘 한다면 매우 뿌듯할 것이다" },
    { id: 376, text: "나는 다른 학생들 보다 나쁜 성적을 받게 될까봐 걱정한다" },
    { id: 377, text: "내가 공부하는 이유는 수업내용을 완벽하게 이해하고 싶기 때문이다" },
    { id: 378, text: "나는 수업 내용을 완벽하게 이해하지 못 할까봐 두렵다" },
    { id: 379, text: "나에게는 다른 학생들 보다 공부를 잘 하는 것이 중요하다" },
    { id: 380, text: "내가 공부하는 이유는 다른 학생들 보다 나쁜 성적을 받지 않기 위해서이다" },
    { id: 381, text: "나는 수업에서 가능한 한 많은 것을 배우고 싶다" },
    { id: 382, text: "나는 수업에 반드시 알아야 하는 것을 배우지 못 할까봐 걱정한다" },
    { id: 383, text: "수업시간에 내가 다른 학생들에 비해 더 잘 한다는 것은 나에게 중요하다" },
    { id: 384, text: "내가 공부하는 이유는 단지 다른 학생들보다 나쁜 성적을 받는 것이 싫기 때문이다" },
    { id: 385, text: "나는 수업에서 나의 능력을 향상시킬 수 있는 기회를 찾는다" },
    { id: 386, text: "내가 공부하는 이유는 수업시간에 배운 내용을 이해하지 못 할까봐 두렵기 때문이다" },
    { id: 387, text: "나는 해야 할 공부양이 많다" },
    { id: 388, text: "나는 몸이 아프더라도 공부를 어쩔 수 없이 해야 한다." },
    { id: 389, text: "나는 공부를 해도 해도 끝이 없다." },
    { id: 390, text: "나는 공부양이 많아 정말 하고 싶은 것을 할 수가 없다." },
    { id: 391, text: "나는 공부 할 것이 많아 항상 시간에 쫓긴다." },
    { id: 392, text: "나는 공부 때문에 마음이 너무 메마른 느낌이다." },
    { id: 393, text: "나는 학교 수업이 끝나고 집에 돌아오면 완전히 지친다." },
    { id: 394, text: "나는 아침에 일어나면 학교에 가서 다시 공부를 해야하는 것 때문에 힘들다." },
    { id: 395, text: "나는 공부를 하거나 수업에 참여하는 것 때문에 스트레스를 많이 받는다." },
    { id: 396, text: "나는 공부로 인해 지쳤다고 느낀다." },
    { id: 397, text: "나는 현재 학교 공부에 대해 흥미가 없다." },
    { id: 398, text: "나는 현재 공부에 대한 열정이 없다." },
    { id: 399, text: "나는 공부가 미래에 도움이 될 지 의심스럽다." },
    { id: 400, text: "나는 내가 하고 있는 공부가 중요한 지 의심스럽다." },
    { id: 401, text: "나는 공부하면서 생기는 문제를 효과적으로 해결할 수 있다." },
    { id: 402, text: "나는 학교 수업에 활발하게 참여한다고 생각한다." },
    { id: 403, text: "내 생각에 나는 훌륭한 학생이다." },
    { id: 404, text: "나는 학업 목표를 성취할 때 새로운 것을 해보고 싶은 마음이 생긴다." },
    { id: 405, text: "나는 공부를 통해 흥미 있는 내용을 많이 배웠다." },
    { id: 406, text: "나는 수업 중 활동을 잘 했다고 확신한다." },
    { id: 407, text: "나는 공부 없는 세상에서 살고 싶다." },
    { id: 408, text: "나는 공부가 중요한 세상이 싫어진다." },
    { id: 409, text: "나는 공부 밖에 없는 세상이 싫다." },
    { id: 410, text: "나는 공부하기 싫다." },
    { id: 411, text: "나는 공부로 인해 짜증스러움을 느낀다." },
    { id: 412, text: "나는 아침에 일어나면, 수업을 들으러 가고 싶다." },
    { id: 413, text: "학생으로서 공부할 때, 나는 에너지가 넘쳐흐르는 느낌이 든다." },
    { id: 414, text: "학업에 관해서라면, 나는 정신적으로 매우 회복력이 있다. (지쳤다가도 원상태로 잘 되돌아올 수 있다)." },
    { id: 415, text: "나는 공부하거나 수업 들으러 갈 때 힘이 나고 활기찬 느낌이 든다." },
    { id: 416, text: "나에게 있어 공부는 도전의식을 불러일으킨다." },
    { id: 417, text: "공부는 나에게 열의를 느끼게 한다." },
    { id: 418, text: "나는 나의 학업에 자부심을 느낀다." },
    { id: 419, text: "나는 학업에 의미와 목적이 가득하다고 생각한다." },
    { id: 420, text: "나는 공부를 잘한다." },
    { id: 421, text: "나는 공부에 있어 누구에게도 뒤지지 않는다." },
    { id: 422, text: "나는 공부에 자신이 있다." },
    { id: 423, text: "나는 어려운 과제도 충분히 해결할 만한 능력이 있다." },
    { id: 424, text: "나는 공부할 때, 내 주변의 다른 모든 것을 잊어버린다." },
    { id: 425, text: "나는 공부할 때 시간이 잘 간다." },
    { id: 426, text: "나는 공부를 하다보면 완전히 열중하게 된다." },
    { id: 427, text: "나는 공부에 몰두해 있다 (푹 빠져있다)." },
    { id: 428, text: "나는 공부할 것이 많아 항상 시간에 쫓긴다." },
    { id: 429, text: "나는 공부를 하다가 중단되거나 방해를 받는 경우가 많다." },
    { id: 430, text: "나는 공부를 하는데 있어 책임이 막중하다." },
    { id: 431, text: "나는 자주 늦게까지 공부하도록 압력을 받는다." },
    { id: 432, text: "나는 공부를 하는 것이 체력적으로 힘이 든다." },
    { id: 433, text: "지난 수년 동안, 나는 공부하는 것이 점점 더 힘들어졌다." },
    { id: 434, text: "내용이 어렵다 하더라도 계속해서 공부한다." },
    { id: 435, text: "선생님이 가르치는 내용을 배우기 위하여 최선을 다한다." },
    { id: 436, text: "나는 공부를 통해 교사로부터 인정을 받고 있다." },
    { id: 437, text: "나는 공부를 통해 친구들로부터 인정을 받고 있다." },
    { id: 438, text: "나는 공부하다가 어려움에 처할 경우 적절한 도움을 받는다." },
    { id: 439, text: "나는 학교에서 공부 때문에 부당한 대우를 받고 있다." },
    { id: 440, text: "성적이 오를 가능성이 별로 없다." },
    { id: 441, text: "공부하는 환경에 좋지 않은 변화가 있거나 있을 것으로 예상된다." },
    { id: 442, text: "내 성적은 안정적이지 못하다." },
    { id: 443, text: "내 현재 성적은 내가 공부한 양을 고려했을 때 적절하다." },
    { id: 444, text: "나는 내가 열심히 공부한 만큼 학교에서 인정받는다." },
    { id: 445, text: "내가 노력한 것을 고려할 때, 내 성적은 좋아질 것이다." },
    { id: 446, text: "내가 노력한 것을 고려할 때, 내 성적은 적절하다." },
    { id: 447, text: "나는 종종 공부하면서 시간에 쫓겨 허둥댄다." },
    { id: 448, text: "나는 아침에 일어나자마자 공부에 대한 문제부터 생각하게 된다." },
    { id: 449, text: "나는 집에서는 쉽게 긴장을 풀고 공부를 잊을 수 있다." },
    { id: 450, text: "내 가까이 있는 사람들은 내가 공부 때문에 너무 많이 희생을 한다고 말한다." },
    { id: 451, text: "나는 잠자리에 들어도 공부가 머릿속에서 떠나지 않는다." },
    { id: 452, text: "나는 오늘 공부해야 하는 것을 미루면 밤에 잠을 잘 수 없다." },
    { id: 453, text: "공부할 때 많은 부분을 내가 결정할 수 있다" },
    { id: 454, text: "나는 공부할 때 교재나 도구가 필요하면 마음대로 사용하거나 살 수 있다" },
    { id: 455, text: "공부하는 방식(예. 학원 수강, 과외 등)을 내 마음대로 조절할 수 있다." },
    { id: 456, text: "공부하는 양을 내 마음대로 조절할 수 있다" },
    { id: 457, text: "나의 의지에 따라 성적을 향상시킬 수 있다" },
    { id: 458, text: "공부하는 시간과 스케쥴을 내 마음대로 조절할 수 있다" },
    { id: 459, text: "나는 공부를 하는 동안 공부를 계속하거나 잠깐 쉬거나 하는 것을 마음대로 할 수 있다" },
    { id: 460, text: "분명한 목적(목표)를 가지고 있다." },
    { id: 461, text: "목표(장기, 중기, 단기)를 세운다." },
    { id: 462, text: "행동에 옮길 수 있는 구체적인 목표를 세운다." },
    { id: 463, text: "목표 달성 예정일을 정한다." },
    { id: 464, text: "해야 할 일의 우선 순위를 정한다." },
    { id: 465, text: "일의 중요도(중요한 일과 덜 중요한 일)에 따라 순서를 정한다." },
    { id: 466, text: "일의 긴급도(급히 처리해야 할 일과 급하지 않은 일)에 따라 순서를 정한다." },
    { id: 467, text: "일의 중요도와 긴급도 모두를 고려하여 순서를 정한다." },
    { id: 468, text: "계획 세우는 시간을 따로 마련한다." },
    { id: 469, text: "계획(장기, 중기, 단기)을 세운다." },
    { id: 470, text: "계획을 세우고 계획한 일 및 그 일에 필요한 소요 시간을 써둔다." },
    { id: 471, text: "빡빡한 계획보다는 여유있는 계획을 세운다." },
    { id: 472, text: "계획표에 따라 생활하는 편이다." },
    { id: 473, text: "계획한 것을 실천하는 데 별 어려움을 느끼지 않는다." },
    { id: 474, text: "실행하는 데 어려움이 생기더라도 강한 의지력과 투지를 발휘하여 목표를 달성한다." },
    { id: 475, text: "일의 진행 과정과 성과에 대해 평가해 본다." },
    { id: 476, text: "이 일이 정말 나에게 필요한 일이고 가치 있는 일인지 생각해 본다." },
    { id: 477, text: "내가 끝내지 못한 일은 무엇이고 그 원인은 무엇인지 생각해 본다." },
    { id: 478, text: "다음 계획에 반영시켜야 될 것이 무엇인지 생각해본다." },
    { id: 479, text: "정보의 정확성과 유용성을 따져 본 후 이용한다." },

// 척도 옵션 생성
function generateOptions(scaleType, scaleStart, itemId) {
    let html = '';
    const labels = getScaleLabels(scaleType, scaleStart);
    
    for (let i = 0; i < scaleType; i++) {
        const value = scaleStart + i;
        
        // 레이블을 숫자와 텍스트로 분리
        const parts = labels[i].split('<br>');
        const number = parts[0];
        const text = parts[1] || '';
        
        html += `
            <div class="option-wrapper" onclick="selectOption(${itemId}, ${value})" data-item="${itemId}" data-value="${value}">
                <div class="option-circle">${number}</div>
                ${text ? `<div class="option-text">${text}</div>` : ''}
            </div>
        `;
    }
    
    return html;
}

// 척도 레이블
function getScaleLabels(scaleType, scaleStart) {
    if (scaleType === 4 && scaleStart === 0) {
        return ['0<br>극히 드물게', '1<br>가끔', '2<br>자주', '3<br>거의대부분'];
    } else if (scaleType === 4 && scaleStart === 1) {
        return ['1<br>전혀 그렇지 않다', '2<br>그렇지 않다', '3<br>그렇다', '4<br>매우 그렇다'];
    } else if (scaleType === 5 && scaleStart === 0) {
        return ['0<br>전혀 그렇지 않다', '1', '2<br>보통이다', '3', '4<br>매우 그렇다'];
    } else if (scaleType === 5 && scaleStart === 1) {
        return ['1<br>전혀 그렇지 않다', '2', '3<br>보통이다', '4', '5<br>매우 그렇다'];
    } else if (scaleType === 6 && scaleStart === 0) {
        return ['0<br>전혀없음', '1<br>한달에 1-2번', '2<br>1주에 1번', '3<br>1주에 2-3번', '4<br>거의 매일', '5<br>매일'];
    } else if (scaleType === 6 && scaleStart === 1) {
        return ['1<br>전혀 아니다', '2', '3<br>약간 아니다', '4<br>약간 그렇다', '5', '6<br>매우 그렇다'];
    } else if (scaleType === 7) {
        return ['1<br>전혀 그렇지 않다', '2', '3', '4<br>보통이다', '5', '6', '7<br>매우 그렇다'];
    }
    
    // 기본
    const labels = [];
    for (let i = 0; i < scaleType; i++) {
        labels.push(String(scaleStart + i));
    }
    return labels;
}

// 옵션 선택
// 역채점 계산 함수
function reverseScore(value, scaleStart, scaleType) {
    const scaleMax = scaleStart + scaleType - 1;
    
    if (scaleStart === 0) {
        // 0-based 척도: 0~3, 0~4, 0~5
        return scaleMax - value;
    } else {
        // 1-based 척도: 1~4, 1~5, 1~6, 1~7
        return (scaleMax + 1) - value;
    }
}

// MHC-SF 긍정성 범주 분류 (Keyes' MHC-SF: 번영 / 중간 / 쇠약)
// SPSS 구문 기반:
//   번영: (mhc1~3 중 1개 이상 ≥4) AND (mhc4~14 중 6개 이상 ≥4)
//   쇠약: (mhc1~3 중 1개 이상 <2) AND (mhc4~14 중 6개 이상 <2)
//   중간: 둘 다 아님
//   ※ SPSS RECODE 순서상 쇠약이 번영보다 우선
function calculateMHCSFCategory(mhcItemIds) {
    const vals = mhcItemIds.map(id => responses[id]);
    if (vals.some(v => v === undefined)) {
        return { category: null, label: '미응답', flourishingSum: null, languishingSum: null };
    }
    // mhc1~3 = vals[0..2], mhc4~14 = vals[3..13]
    const flourishingEmotion = (vals[0] >= 4 || vals[1] >= 4 || vals[2] >= 4) ? 1 : 0;
    let flourishingSum = 0;
    for (let i = 3; i < 14; i++) if (vals[i] >= 4) flourishingSum++;
    const flourishing = (flourishingEmotion >= 1 && flourishingSum >= 6) ? 1 : 0;

    const languishingEmotion = (vals[0] < 2 || vals[1] < 2 || vals[2] < 2) ? 1 : 0;
    let languishingSum = 0;
    for (let i = 3; i < 14; i++) if (vals[i] < 2) languishingSum++;
    const languishing = (languishingEmotion >= 1 && languishingSum >= 6) ? 1 : 0;

    let category, label;
    if (languishing === 1) { category = 3; label = '쇠약'; }
    else if (flourishing === 1) { category = 1; label = '번영'; }
    else { category = 2; label = '중간'; }

    return { category, label, flourishingSum, languishingSum };
}

// SRQ_A 상대적 자율성 지수 (RAI: Relative Autonomy Index)
// 공식: RAI = 2*Intrinsic + Identified − Extrinsic − 2*Introjected
// 하위요인 평균값(이미 계산된 값)을 입력으로 사용
function calculateSRQA_RAI(subfactorScores) {
    const I  = subfactorScores.Intrinsic;
    const Id = subfactorScores.Identified;
    const E  = subfactorScores.Extrinsic;
    const Ij = subfactorScores.Introjected;
    if (I === null || Id === null || E === null || Ij === null ||
        I === undefined || Id === undefined || E === undefined || Ij === undefined) {
        return null;
    }
    return parseFloat((2 * I + Id - E - 2 * Ij).toFixed(3));
}

// 검사별 총점 + 전체 평균 + 하위요인 평균 계산
function calculateTestScore(testIndex) {
    const test = psychologicalTests[testIndex];
    let rawTotal = 0;       // 원점수 합계
    let reversedTotal = 0;  // 역채점 후 총점
    let answeredCount = 0;  // 응답한 문항 수
    const reversedValues = {}; // 역채점 적용된 문항별 값 (1-based 문항번호)

    test.items.forEach((itemId, idx) => {
        const itemNum = idx + 1;
        const response = responses[itemId];

        if (response !== undefined) {
            rawTotal += response;
            answeredCount++;
            if (test.reverseItems.includes(itemNum)) {
                const rev = reverseScore(response, test.scaleStart, test.scaleType);
                reversedTotal += rev;
                reversedValues[itemNum] = rev;
            } else {
                reversedTotal += response;
                reversedValues[itemNum] = response;
            }
        }
    });

    // 전체 평균 (역채점 적용 후 값 기준)
    const overallMean = answeredCount > 0
        ? parseFloat((reversedTotal / answeredCount).toFixed(3))
        : null;

    // 하위요인별 평균 점수 계산 (역채점 적용 후 값 기준)
    const subfactorScores = {};
    if (test.subfactors && Object.keys(test.subfactors).length > 0) {
        for (const [factorName, itemNums] of Object.entries(test.subfactors)) {
            let sum = 0, count = 0;
            itemNums.forEach(n => {
                if (reversedValues[n] !== undefined) {
                    sum += reversedValues[n];
                    count++;
                }
            });
            subfactorScores[factorName] = count > 0
                ? parseFloat((sum / count).toFixed(3))
                : null;
        }
    }

    // 검사별 특수 점수 (예: MHC-SF 긍정성 분류)
    let categoricalResult = null;
    if (test.name === "MHCSF") {
        categoricalResult = calculateMHCSFCategory(test.items);
    }

    // 검사별 합성 점수 (예: SRQ_A의 RAI)
    let RAI = null;
    if (test.name === "SRQA") {
        RAI = calculateSRQA_RAI(subfactorScores);
    }

    return { rawTotal, reversedTotal, overallMean, subfactorScores, categoricalResult, RAI };
}

function selectOption(itemId, value) {
    responses[itemId] = value;
    
    // localStorage 자동 저장
    localStorage.setItem('psychTest_responses', JSON.stringify(responses));
    
    // 시각적 업데이트
    const optionsDiv = document.getElementById(`options_${itemId}`);
    const wrappers = optionsDiv.querySelectorAll('.option-wrapper');
    wrappers.forEach(opt => opt.classList.remove('selected'));
    
    // 클릭한 wrapper 찾아서 선택 표시
    wrappers.forEach(wrapper => {
        if (parseInt(wrapper.dataset.value) === value) {
            wrapper.classList.add('selected');
        }
    });
    
    updateProgress();
}

// 검사 표시
function showTest(testIdx) {
    document.querySelectorAll('#testSections > .section').forEach(s => s.classList.remove('active'));
    document.getElementById(`test${testIdx}`).classList.add('active');
    currentTestIndex = testIdx;
    updateProgress();
    window.scrollTo(0, 0);
}

// 다음 검사
function nextTest() {
    const test = psychologicalTests[currentTestIndex];
    
    // 현재 검사 완료 확인
    let allAnswered = true;
    for (const itemId of test.items) {
        if (responses[itemId] === undefined) {
            allAnswered = false;
            break;
        }
    }
    
    if (!allAnswered) {
        alert('모든 문항에 응답해주세요.');
        return;
    }
    
    if (currentTestIndex < psychologicalTests.length - 1) {
        showTest(currentTestIndex + 1);
    } else {
        completeTest();
    }
}

// 이전 검사
function prevTest() {
    if (currentTestIndex > 0) {
        showTest(currentTestIndex - 1);
    }
}

// 진행률 업데이트
function updateProgress() {
    document.getElementById('currentTest').textContent = currentTestIndex + 1;
    
    const test = psychologicalTests[currentTestIndex];
    let answeredCount = 0;
    for (const itemId of test.items) {
        if (responses[itemId] !== undefined) {
            answeredCount++;
        }
    }
    
    document.getElementById('currentItem').textContent = answeredCount;
    document.getElementById('totalItems').textContent = test.items.length;
    
    // 진행률 바
    const testProgress = ((currentTestIndex + 1) / psychologicalTests.length) * 100;
    document.getElementById('testProgressBar').style.width = testProgress + '%';
    
    const itemProgress = (answeredCount / test.items.length) * 100;
    document.getElementById('itemProgressBar').style.width = itemProgress + '%';
}

// 검사 완료
function completeTest() {
    userData.endTime = new Date().toISOString();
    
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('resultSection').classList.add('active');
    document.getElementById('progressContainer').style.display = 'none';
    
    // 결과 정보 표시
    document.getElementById('resultUserInfo').innerHTML = `
        <h3>응답자 정보</h3>
        <p><strong>ID:</strong> ${userData.userId}</p>
        <p><strong>성별:</strong> ${userData.gender}</p>
        <p><strong>전공:</strong> ${userData.major}</p>
        <p><strong>시작 시간:</strong> ${new Date(userData.startTime).toLocaleString('ko-KR')}</p>
        <p><strong>완료 시간:</strong> ${new Date(userData.endTime).toLocaleString('ko-KR')}</p>
    `;
    
    // localStorage 저장
    const fullResult = {
        userData: userData,
        responses: responses,
        timestamp: new Date().toISOString()
    };
    localStorage.setItem('psychTest_completed', JSON.stringify(fullResult));
    
    window.scrollTo(0, 0);
}

// 결과 다운로드
function downloadResults() {
    // TXT 형식으로 결과 생성
    let txtContent = '';
    
    // 헤더
    txtContent += '='.repeat(80) + '\n';
    txtContent += '심리검사 결과\n';
    txtContent += '='.repeat(80) + '\n\n';
    
    // 사용자 정보
    txtContent += '[사용자 정보]\n';
    txtContent += `ID: ${userData.userId}\n`;
    txtContent += `성별: ${userData.gender}\n`;
    txtContent += `전공: ${userData.major}\n`;
    txtContent += `시작 시간: ${new Date(userData.startTime).toLocaleString('ko-KR')}\n`;
    txtContent += `완료 시간: ${new Date(userData.endTime).toLocaleString('ko-KR')}\n`;
    txtContent += '\n';
    
    // 검사별 결과
    txtContent += '='.repeat(80) + '\n';
    txtContent += '검사별 응답 결과\n';
    txtContent += '='.repeat(80) + '\n\n';
    
    psychologicalTests.forEach((test, testIdx) => {
        txtContent += `[${test.fullName}]\n`;
        txtContent += '-'.repeat(80) + '\n';
        
        // 검사별 총점 계산
        const scores = calculateTestScore(testIdx);
        txtContent += `원점수 합계: ${scores.rawTotal}점\n`;
        txtContent += `역채점 후 총점: ${scores.reversedTotal}점\n`;
        txtContent += `전체 평균 (역채점 적용): ${scores.overallMean !== null ? scores.overallMean.toFixed(2) : '미응답'}\n`;
        txtContent += `역문항 개수: ${test.reverseItems.length}개\n`;

        // 하위요인 점수 출력
        if (scores.subfactorScores && Object.keys(scores.subfactorScores).length > 0) {
            txtContent += `\n  [하위요인 평균 점수 (역채점 적용)]\n`;
            for (const [factor, val] of Object.entries(scores.subfactorScores)) {
                const display = val !== null ? val.toFixed(2) : '미응답';
                txtContent += `  · ${factor}: ${display}\n`;
            }
        }

        // 특수 분류 결과 (예: MHC-SF 긍정성 분류)
        if (scores.categoricalResult) {
            const cr = scores.categoricalResult;
            txtContent += `\n  [긍정성 분류 (Keyes' MHC-SF 기준)]\n`;
            txtContent += `  · 분류: ${cr.label}\n`;
            if (cr.flourishingSum !== null) {
                txtContent += `  · 번영 기준 충족 (사회/심리 11문항 중 4점 이상): ${cr.flourishingSum}개 / 11개\n`;
                txtContent += `  · 쇠약 기준 충족 (사회/심리 11문항 중 2점 미만): ${cr.languishingSum}개 / 11개\n`;
            }
        }

        // 합성 점수 (예: SRQ_A의 RAI)
        if (scores.RAI !== undefined && scores.RAI !== null) {
            txtContent += `\n  [상대적 자율성 지수 (RAI)]\n`;
            txtContent += `  · RAI: ${scores.RAI.toFixed(2)}\n`;
        }
        txtContent += '-'.repeat(80) + '\n\n';
        
        txtContent += '\n';
    });
    
    // 파일 다운로드
    const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `심리검사결과_${userData.userId}_${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

// Google Sheets에 결과 제출
async function submitToGoogleSheets() {
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('submitMessage');
    
    // URL 확인
    if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
        messageDiv.style.display = 'block';
        messageDiv.style.background = '#fee';
        messageDiv.style.color = '#c0392b';
        messageDiv.innerHTML = '❌ Google Apps Script URL이 설정되지 않았습니다.<br>설정 가이드를 참고하여 GOOGLE_SCRIPT_URL을 설정해주세요.';
        return;
    }
    
    // 버튼 비활성화
    submitBtn.disabled = true;
    submitBtn.textContent = '제출 중...';
    messageDiv.style.display = 'block';
    messageDiv.style.background = '#fff3cd';
    messageDiv.style.color = '#856404';
    messageDiv.innerHTML = '⏳ 데이터를 제출하는 중입니다...';
    
    try {
        // 제출할 데이터 준비
        const submissionData = {
            userData: userData,
            timestamp: new Date().toISOString(),
            responses: responses,
            testScores: {}
        };
        
        // 각 검사별 점수 계산 (전체 평균 + 하위요인 + 특수 분류 + 합성 점수)
        psychologicalTests.forEach((test, idx) => {
            const scores = calculateTestScore(idx);
            submissionData.testScores[test.fullName] = {
                rawTotal: scores.rawTotal,
                reversedTotal: scores.reversedTotal,
                overallMean: scores.overallMean,
                reverseItemCount: test.reverseItems.length,
                subfactorScores: scores.subfactorScores || {},
                categoricalResult: scores.categoricalResult || null,
                RAI: scores.RAI !== undefined ? scores.RAI : null
            };
        });
        
        // Google Apps Script에 POST 요청
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(submissionData)
        });
        
        // 성공 메시지
        messageDiv.style.background = '#d4edda';
        messageDiv.style.color = '#155724';
        messageDiv.innerHTML = '✅ 결과가 성공적으로 제출되었습니다!<br>관리자가 Google Sheets에서 확인할 수 있습니다.';
        submitBtn.textContent = '✅ 제출 완료';
        
        // localStorage 클리어 (선택사항)
        // localStorage.removeItem('psychTest_userData');
        // localStorage.removeItem('psychTest_responses');
        
    } catch (error) {
        // 에러 메시지
        messageDiv.style.background = '#fee';
        messageDiv.style.color = '#c0392b';
        messageDiv.innerHTML = '❌ 제출 중 오류가 발생했습니다.<br>' + error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = '📤 결과 제출 (Google Sheets)';
    }
}
